<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>马潇 · 空间设计师</title>

  <!-- ==================== 1. Premium Fonts ==================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ============================================================
       🎨 DESIGN SYSTEM — Editorial Luxury Portfolio
       Design Read: Solo designer portfolio, editorial luxury language
       Dials: VARIANCE 6 / MOTION 5 / DENSITY 3
       ============================================================ */

    /* ---------- CSS Variables ---------- */
    :root {
      /* Warm paper palette */
      --color-bg:            #faf9f7;
      --color-surface:       #f3f1ed;
      --color-surface-alt:   #ece9e3;
      --color-border:        #e5e2dc;
      --color-border-light:  #efede9;
      --color-text:          #1c1917;
      --color-text-muted:    #78716c;
      --color-text-soft:     #a8a29e;

      /* Refined accent system — desaturated, sophisticated */
      --accent-graphic:      #4b7cb5;
      --accent-space:        #b8860b;
      --accent-product:      #3b8b6b;
      --accent-interior:     #c4628b;
      --color-accent:        #4b7cb5;

      /* Typography */
      --font-heading: 'Playfair Display', 'Noto Serif SC', 'Source Han Serif SC', serif;
      --font-body:    'Plus Jakarta Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;

      /* Spacing scale */
      --space-section: 6rem;

      /* Radius */
      --radius-card:   1.25rem;
      --radius-pill:   9999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-weight: 350;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ---------- Subtle paper texture overlay ---------- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    /* ---------- Typography ---------- */
    h1, h2, h3, h4, .font-heading {
      font-family: var(--font-heading);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ---------- Scrollbar ---------- */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d6d3ce; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8b4ae; }

    /* ---------- Accent utility classes ---------- */
    .text-accent-graphic  { color: var(--accent-graphic); }
    .text-accent-space    { color: var(--accent-space); }
    .text-accent-product  { color: var(--accent-product); }
    .text-accent-interior { color: var(--accent-interior); }
    .bg-accent-graphic    { background-color: var(--accent-graphic); }
    .bg-accent-space      { background-color: var(--accent-space); }
    .bg-accent-product    { background-color: var(--accent-product); }
    .bg-accent-interior   { background-color: var(--accent-interior); }

    /* ============================================================
       NAVIGATION — Floating Glass Pill
       ============================================================ */
    .nav-pill {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(250, 249, 247, 0.78);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      padding: 0.5rem 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.15rem;
      box-shadow: 0 1px 3px rgba(28, 25, 23, 0.04), 0 8px 24px rgba(28, 25, 23, 0.05);
      transition: box-shadow 0.5s cubic-bezier(0.32, 0.72, 0, 1),
                  border-color 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .nav-pill.scrolled {
      border-color: #d1cdc6;
      box-shadow: 0 1px 2px rgba(28, 25, 23, 0.06), 0 12px 32px rgba(28, 25, 23, 0.08);
    }

    .nav-link {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-decoration: none;
      padding: 0.45rem 1rem;
      border-radius: var(--radius-pill);
      transition: all 0.45s cubic-bezier(0.32, 0.72, 0, 1);
      white-space: nowrap;
      position: relative;
    }
    .nav-link:hover {
      color: var(--color-text);
      background: rgba(28, 25, 23, 0.05);
    }
    .nav-link.active {
      color: var(--color-text);
      background: rgba(28, 25, 23, 0.07);
    }

    /* Mobile: simplified nav */
    @media (max-width: 767px) {
      .nav-pill {
        top: 0.75rem;
        padding: 0.4rem 0.6rem;
        gap: 0;
      }
      .nav-link {
        font-size: 0.65rem;
        padding: 0.35rem 0.55rem;
        letter-spacing: 0.03em;
      }
    }

    /* ============================================================
       DOUBLE-BEZEL CARDS — Nested architecture (Section 4.A)
       ============================================================ */
    .card-shell {
      position: relative;
      background: var(--color-surface-alt);
      border: 1px solid var(--color-border-light);
      border-radius: calc(var(--radius-card) + 0.35rem);
      padding: 0.35rem;
      transition: all 0.7s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .card-shell:hover {
      background: #e2ded8;
      border-color: #d5d0c8;
      box-shadow: 0 2px 6px rgba(28, 25, 23, 0.04), 0 16px 40px rgba(28, 25, 23, 0.07);
    }

    .card-core {
      background: #fff;
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: all 0.7s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.6);
    }
    .card-shell:hover .card-core {
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    /* Bento grid — asymmetric card sizes */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.25rem;
      grid-auto-rows: auto;
      grid-auto-flow: dense;
    }
    .bento-grid .bento-item {
      min-width: 0;
    }
    /* Varied col-spans for visual rhythm */
    .bento-grid .bento-item:nth-child(3n+1) { grid-column: span 7; }
    .bento-grid .bento-item:nth-child(3n+2) { grid-column: span 5; }
    .bento-grid .bento-item:nth-child(3n+3) { grid-column: span 6; }
    .bento-grid .bento-item:nth-child(5n+4) { grid-column: span 6; }

    @media (max-width: 767px) {
      .bento-grid .bento-item { grid-column: span 12 !important; }
      .bento-grid { gap: 1rem; }
      .card-shell { padding: 0.25rem; }
    }

    /* ============================================================
       IMAGE HOVER — Gentle scale with luminosity shift
       ============================================================ */
    .img-wrapper {
      overflow: hidden;
      aspect-ratio: 4/3;
      position: relative;
      cursor: pointer;
    }
    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.32, 0.72, 0, 1),
                  filter 0.8s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .card-shell:hover .img-wrapper img {
      transform: scale(1.03);
      filter: brightness(1.04);
    }

    /* ============================================================
       SKILL TAGS — Refined pill design
       ============================================================ */
    .skill-tag {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 450;
      letter-spacing: 0.02em;
      color: var(--color-text-muted);
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      padding: 0.35rem 0.9rem;
      transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
      cursor: default;
      user-select: none;
    }
    .skill-tag:hover {
      color: #fff;
      background: var(--color-text);
      border-color: var(--color-text);
      transform: translateY(-1px);
    }

    /* ============================================================
       BUTTONS — Refined outline style
       ============================================================ */
    .btn-outline {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--color-text-muted);
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .btn-outline:hover {
      color: #fff;
      background: var(--color-text);
      border-color: var(--color-text);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(28, 25, 23, 0.12);
    }
    .btn-outline:active {
      transform: scale(0.97);
    }

    /* ============================================================
       AVATAR — Double-ring treatment
       ============================================================ */
    .avatar-container {
      position: relative;
      display: inline-block;
    }
    .avatar-outer-ring {
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, var(--color-border) 0%, var(--color-surface-alt) 100%);
      box-shadow: 0 2px 12px rgba(28, 25, 23, 0.06);
    }
    .avatar-inner {
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #fff;
      box-shadow: 0 1px 3px rgba(28, 25, 23, 0.08);
    }

    /* ============================================================
       SECTION ACCENT LINE — Refined indicator
       ============================================================ */
    .accent-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .accent-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }
    .accent-line {
      width: 18px;
      height: 2px;
      border-radius: 1px;
    }

    /* ============================================================
       DIVIDERS — Elegant dot row
       ============================================================ */
    .divider-dots {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .divider-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-border);
    }
    .divider-dots span:first-child {
      background: var(--color-text-muted);
    }

    /* ============================================================
       SCROLL ENTRY ANIMATIONS (Section 5.C)
       Animate ONLY transform + opacity
       ============================================================ */
    .reveal-up {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s cubic-bezier(0.32, 0.72, 0, 1),
                  transform 0.8s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .reveal-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Staggered children */
    .reveal-stagger > * {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s cubic-bezier(0.32, 0.72, 0, 1),
                  transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .reveal-stagger.visible > *:nth-child(1) { transition-delay: 0ms; opacity: 1; transform: translateY(0); }
    .reveal-stagger.visible > *:nth-child(2) { transition-delay: 80ms; opacity: 1; transform: translateY(0); }
    .reveal-stagger.visible > *:nth-child(3) { transition-delay: 160ms; opacity: 1; transform: translateY(0); }
    .reveal-stagger.visible > *:nth-child(4) { transition-delay: 240ms; opacity: 1; transform: translateY(0); }
    .reveal-stagger.visible > *:nth-child(5) { transition-delay: 320ms; opacity: 1; transform: translateY(0); }
    .reveal-stagger.visible > *:nth-child(n+6) { transition-delay: 380ms; opacity: 1; transform: translateY(0); }

    /* ============================================================
       LIGHTBOX — Refined overlay
       ============================================================ */
    #lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(28, 25, 23, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
    }
    #lightbox-overlay.show { display: flex; }
    #lightbox-overlay img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }
    #lightbox-overlay .lightbox-caption {
      color: #b8b4ae;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      font-weight: 350;
      text-align: center;
      max-width: 520px;
      letter-spacing: 0.02em;
    }

    /* QR overlay */
    #qr-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(28, 25, 23, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    #qr-overlay.show { display: flex; }
    #qr-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 16px; }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    html { scroll-behavior: smooth; }

    @media (max-width: 767px) {
      :root { --space-section: 3.5rem; }
      body { font-size: 0.925rem; }
    }
  </style>
</head>
<body>

  <nav class="nav-pill" id="nav-pill" role="navigation" aria-label="主导航">
    <span style="width:7px;height:7px;border-radius:50%;background:var(--accent-graphic);margin:0 0.5rem 0 0.3rem;flex-shrink:0;"></span>

    // ============================================================
    //  RENDER FUNCTIONS
    // ============================================================

    function renderHeader() {
      document.getElementById('nav-brand').textContent = DATA.headerName;
      const navLinks = document.getElementById('nav-links');
      navLinks.innerHTML = DATA.categories.map(cat =>
        `<a href="#section-${cat.id}" class="nav-link" data-nav="${cat.id}">${escapeHTML(cat.name)}</a>`
      ).join('');
    }

    function renderProfile() {
      const p = DATA.profile;
      document.getElementById('avatar-img').src = p.avatar;
      document.getElementById('avatar-img').alt = p.name + ' 的头像';
      document.getElementById('hero-bio').innerHTML = p.bio;
      document.getElementById('sidebar-bio').innerHTML = p.bio.replace(/<br>/g, '<br>');
    }

    function renderSkills() {
      const container = document.getElementById('skills-container');
      if (!container) return;
      container.innerHTML = DATA.skills.map(s =>
        `<span class="skill-tag">${escapeHTML(s)}</span>`
      ).join('');
    }

    function renderQRCode() {
      document.getElementById('qr-image').src = DATA.qrCode.image;
      document.getElementById('qr-guide-text').textContent = DATA.qrCode.guideText;
    }

    function renderCategories() {
      const container = document.getElementById('categories-container');
      const empty = document.getElementById('categories-empty');
      const visible = DATA.categories.filter(c => c.works && c.works.length > 0);

      if (visible.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      container.innerHTML = visible.map((cat, catIdx) => {
        const accentVar = `var(--accent-${cat.accentClass})`;
        const count = cat.works.length;

        return `
        <section id="section-${cat.id}" style="margin-bottom:3.5rem;" class="reveal-up">
          <!-- Category header -->
          <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.35rem;">
            <span class="accent-indicator">
              <span class="accent-line" style="background:${accentVar};"></span>
            </span>
            <h3 style="font-family:var(--font-heading);font-weight:600;font-size:1.2rem;letter-spacing:0.01em;">${escapeHTML(cat.name)}</h3>
            <span style="font-size:0.7rem;color:var(--color-text-soft);font-weight:400;">${count} 件作品</span>
          </div>
          <p style="font-size:0.8rem;color:var(--color-text-muted);margin-bottom:1.5rem;font-weight:350;">
            ${escapeHTML(cat.description)}
          </p>

          <!-- Bento grid -->
          <div class="bento-grid reveal-stagger">
            ${cat.works.map((work, idx) => `
              <article class="bento-item">
                <div class="card-shell">
                  <div class="card-core" style="display:flex;flex-direction:column;height:100%;">
                    <div class="img-wrapper" data-lightbox-img="${escapeHTML(work.thumb)}"
                         data-lightbox-caption="${escapeHTML(work.title)} — ${escapeHTML(work.description)}"
                         title="点击放大查看">
                      <img src="${escapeHTML(work.thumb)}" alt="${escapeHTML(work.title)}" loading="lazy">
                    </div>
                    <div style="padding:1.1rem 1.2rem;flex:1;display:flex;flex-direction:column;">
                      <div style="width:22px;height:2.5px;border-radius:1px;margin-bottom:0.6rem;background:${accentVar};"></div>
                      <h4 style="font-family:var(--font-heading);font-weight:600;font-size:1rem;line-height:1.35;margin-bottom:0.4rem;">${escapeHTML(work.title)}</h4>
                      <p style="font-size:0.78rem;color:var(--color-text-muted);line-height:1.65;flex:1;font-weight:350;">${escapeHTML(work.description)}</p>
                      ${work.link ? `
                      <a href="${escapeHTML(work.link)}" target="_blank" rel="noopener"
                         style="display:inline-flex;align-items:center;gap:0.35rem;margin-top:0.75rem;font-size:0.75rem;font-weight:500;letter-spacing:0.03em;color:${accentVar};text-decoration:none;">
                        查看详情
                        <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.04);font-size:0.7rem;transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);">→</span>
                      </a>
                      ` : ''}
                    </div>
                  </div>
                </div>
              </article>
            `).join('')}
          </div>
        </section>`;
      }).join('');
    }

    function renderFooter() {
      document.getElementById('footer-name').textContent = DATA.footerName;
      document.getElementById('footer-year').textContent = DATA.footerYear;
    }

    // ============================================================
    //  INTERACTIONS — Only transform + opacity (Section 6)
    // ============================================================

    /** QR zoom */
    function setupQRZoom() {
      const img = document.getElementById('qr-image');
      const overlay = document.getElementById('qr-overlay');
      const overlayImg = document.getElementById('qr-overlay-img');

      function open(src) {
        overlayImg.src = src;
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        overlay.classList.remove('show');
        document.body.style.overflow = '';
      }
      img.addEventListener('click', () => open(DATA.qrCode.image));
      document.getElementById('btn-zoom-qr').addEventListener('click', () => open(DATA.qrCode.image));
      overlay.addEventListener('click', close);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    }

    /** Lightbox */
    function setupLightbox() {
      const overlay = document.getElementById('lightbox-overlay');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxCaption = document.getElementById('lightbox-caption');
      const container = document.getElementById('categories-container');

      function open(src, caption) {
        lightboxImg.src = src;
        lightboxCaption.textContent = caption;
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        overlay.classList.remove('show');
        document.body.style.overflow = '';
      }
      container.addEventListener('click', (e) => {
        const trigger = e.target.closest('[data-lightbox-img]');
        if (!trigger) return;
        open(trigger.getAttribute('data-lightbox-img'), trigger.getAttribute('data-lightbox-caption') || '');
      });
      overlay.addEventListener('click', close);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    }

    /** Nav scroll shadow */
    function setupNavScroll() {
      const nav = document.getElementById('nav-pill');
      let ticking = false;
      function update() {
        nav.classList.toggle('scrolled', window.scrollY > 20);
        ticking = false;
      }
      window.addEventListener('scroll', () => {
        if (!ticking) { requestAnimationFrame(update); ticking = true; }
      }, { passive: true });
    }

    /** Active nav link detection via IntersectionObserver */
    function setupNavHighlight() {
      const links = document.querySelectorAll('.nav-link[data-nav]');
      if (!links.length) return;
      const observer = new IntersectionObserver((entries) => {
        let activeId = null;
        entries.forEach(e => { if (e.isIntersecting && e.intersectionRatio > 0.2) activeId = e.target.id.replace('section-', ''); });
        if (activeId) {
          links.forEach(l => l.classList.toggle('active', l.getAttribute('data-nav') === activeId));
        }
      }, { threshold: [0.2, 0.5] });
      DATA.categories.forEach(c => {
        const el = document.getElementById('section-' + c.id);
        if (el) observer.observe(el);
      });
    }

    /** Scroll entry reveal — IntersectionObserver, no scroll listeners */
    function setupScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.reveal-up, .reveal-stagger').forEach(el => observer.observe(el));

      // Re-scan after render (MutationObserver)
      const mo = new MutationObserver(() => {
        document.querySelectorAll('.reveal-up:not(.visible), .reveal-stagger:not(.visible)').forEach(el => {
          if (!el.dataset.revealObserved) {
            el.dataset.revealObserved = '1';
            observer.observe(el);
          }
        });
      });
      mo.observe(document.getElementById('categories-container'), { childList: true, subtree: true });
    }

    // ============================================================
    //  UTILITY
    // ============================================================
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
      renderHeader();
      renderProfile();
      renderSkills();
      renderQRCode();
      renderCategories();
      renderFooter();
      setupQRZoom();
      setupLightbox();
      setupNavScroll();
      setupNavHighlight();
      setupScrollReveal();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    window.DATA = DATA;
    window.renderAll = init;
  })();
  </script>

  <!--
    ================================================================
    📖  使用说明

    一、修改自我介绍
       DATA.profile: name / title / bio

    二、更换头像
       DATA.profile.avatar → 你的头像路径

    三、更换二维码
       DATA.qrCode.image → 二维码图片路径

    四、新增/修改作品
       在 DATA.categories[板块].works 数组中添加：
         { title: '标题', thumb: '图片路径', description: '描述', link: '' }

    五、修改配色
       在 :root 中修改 CSS 变量：
         --accent-graphic  → 平面设计点缀色
         --accent-space    → 空间设计点缀色
         --accent-product  → 产品展示点缀色
         --accent-interior → 室内设计点缀色
         --color-bg        → 背景色
         --color-text      → 主文字色

    六、调整动画强度
       修改 MOTION_INTENSITY 对应的 cubic-bezier 时长变量
       减少动画：把 transition duration 从 0.7s 降到 0.3s
    ================================================================
  -->
</body>
</html>
